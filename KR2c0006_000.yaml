body:
  text: 炎徼紀聞紀事本末類提要臣等謹案炎徼紀聞四卷明田汝成撰汝成字叔禾錢塘人嘉靖丙戌進士官至廣西布政司右參議事迹具明史文苑傳史稱其博學工古文尤善敘述厯官西南諳曉先朝遺事撰炎徼紀聞即此編也書凡十四篇首紀王守仁征岑猛事次紀岑璋助擒岑猛事次紀趙楷李寰事次紀黃􅛵請立東宫事次紀征大藤峽事次紀奢香事次紀安貴榮事次紀田琛事次紀楊輝事次紀阿溪事次紀阿向事次紀雲南諸夷次紀猛密孟飬次雜記諸蠻夷每篇各繫以論所載較史為詳前有汝成自序稱自涉炎徼所聞諸事皆起于撫綏缺狀賞罰無章切中明代之弊其論田州之事歸咎于王守仁之姑息論黃􅛵之事歸咎于于謙之隱忍亦持平之議不蹈門户之見史稱汝成分守右江時龍州土酋趙楷慿祥州土酋李寰各弒主自立與副使翁萬達密討誅之努灘賊侯公丁為亂斷藤峽羣賊與相應汝成復偕萬達設䇿誘擒公丁而進兵討峽賊大破之又與萬達建善後七事一方遂靖云云則汝成於邉地情形得諸身厯是書據所見聞而記之固與講學迂儒貿貿而談兵事者逈乎殊矣乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀炎徼紀聞原序余承乏藩臬者十餘年而宦履所經半涉炎徼炎徼之政少催科獄訟之擾其卒然隳突驚心駭目者多夷情而夷情之尤掣肘者在乎土酋獷悍抗敗王略效尤習惡逆節比起法令格閡而不行駸駸乎尾大不掉之患雖欲羈縻漸不可得以治理論之中原易而逺方難近之可憂未若逺之可憂也故先王慎擇逺方之吏若谷永守鬱林而烏滸內屬李靖撫嶺南而逺夷悅服若我朝沐黔寧王鎮雲南而滇酋按堵黃忠宣公治安南而交人不忍遽叛皆由此選也今之仕者率樂中原而厭逺方一閲除書有逺方之命即索然沮喪無復用世之志秉鈞者因而循之逺方之吏半出遷謫之科不然則朴懦無援者也夫遷謫者抱憤躁之懷朴懦者無統御之略措鈍器於盤錯之交難乎其解矣譬之一身中原心腹也逺方四肢也四肢有疾而委之庸醫善攝生者固如是乎故逺方之吏非亷不足以彰威非信不足以立約非才識不足以排難解紛非久任不足以諳土俗練兵機也自余涉炎徼而所聞若干事皆起於撫綏缺狀賞罰無章不肖者以墨守敗績賢者以避嫌徼名二者殊轍而同敝卒致干戈相尋蔓延荼毒下竭生民之膏血上貽廷議之軫憂良可歎也間述所聞著為此書凡一十四篇大方伯希齋陳公見而喜之曰其事核其言詳不虛美不隱惡是可梓而行也且再三強余序諸首簡以宣著作之本指夫公之有取於是書者豈直以文字之華哉無乃以其有關於政紀也况公行有節鉞之賜萬一開府南陲展是書而覽之則鑒昔慎今之餘或少禆於幕議云耳是為序嘉靖三十七年夏五月田汝成序
