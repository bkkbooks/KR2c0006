body:
  text: 炎徼紀聞卷四明田汝成撰雲南雲南古梁州裔境也在大寓西南百夷叢集其巨族曰僰人曰㸑人曰麼㱔曰秃老曰㱔門曰蒲人曰和泥蠻曰白夷曰上獠曰羅舞曰撤麼都曰摩察曰濃人曰山後人曰哀牢人曰峨昌蠻曰解蠻曰魁羅蠻曰傳尋蠻各有部落莫考所起其後哀牢夷有婦人名沙一居牢山捕魚水中觸沉木有感而妊産子九人是為九隆其後子孫繁衍分為九族散處山谷遂為巨姓楚頃襄王使將軍莊蹻略巴黔以西至滇池可數千里以兵威定㑹秦擊楚大亂蹻遂以衆王滇至漢武帝時滇王請降置益州郡而哀牢夷不附後漢光武二十七年渠酋賢栗求內屬奉朝貢明帝永平中渠酋栁貌率衆內附以其地為哀牢博南二縣今之永昌府是也自是哀牢始通中國行者苦之歌曰漢德廣開不賔度博南表其罪閣羅鳯怒攻殺䖍陀破姚州鮮于仲通將兵八萬討之次曲靖閣羅鳯遣使謝罪願還俘掠城姚州仲通不聽閣羅鳯遣其將段儉魏逆戰西洱河唐兵大敗死者六萬人仲通僅以身免閣羅鳯遂臣於吐蕃揭碑國門明叛唐非得已也時楊國忠當國乃調天下兵命李宓征之天寶十三載閣羅鳯誘宓兵深入至太和城堅壁不戰唐兵糧盡饑疫死者什七八宓引還閣羅鳯追擊之全軍皆沒楊國忠隱其敗更以捷聞益發中國兵竟不能克前後死者二十萬人自是南詔與中國絶㑹安祿山反閣羅鳯因之略傍小國自廣改元長夀閣羅鳯死孫異牟尋立清平官鄭回者唐故西瀘令也降於南詔以中國法教異牟尋乃僣立五嶽四瀆改九爽三託之官王自稱曰元猶言朕也稱其臣曰闕猶言卿也官之大者曰清平官以決國闕之宰相也時吐蕃入寇常以雲南兵闕重賦斂奪其疆隘南詔苦之鄭回闕復歸唐異牟尋然之㑹西川節度使韋臯遣人招異牟尋遂謝絶吐蕃復臣於唐德宗貞元十年遣使賜南詔金印異牟尋北面跪受之宴使者出元宗所賜笛工歌女曰先帝所賜龜兹惟二人在耳頃之吐蕃與回鶻戰調南詔萬人異牟尋陽以三千人應之而自將萬人踵襲吐蕃大破之遂斷鐵橋韋臯復出兵助南詔吐蕃苦唐詔犄角竟不能報四傳至豐佑入寇成都取諸經籍大掠子女工技數萬人去自是南詔工技文織與中國埒矣豐佑死子世隆立僣稱皇帝國號大禮屢寇西川陷交址兵威大振僖宗乾符二年髙駢鎮西川以兵擊敗之世隆始服蓋前後為邊患者二十年中國為之虛耗世隆死子隆舜嗣唐以安化長公主妻之一傳舜化真而為布燮鄭買所弒鄭買者鄭回七世孫也篡䝉氏自立國號大長和三傳至鄭隆亶而為東川節度使楊于貞所擊殺立其清平官趙善政代之國號大天興未幾于貞廢善政自立國號大義寧石晉天福元年通海節度使段思平以兵討于貞滅之段思平者段儉魏之六世孫也生有異兆于貞忌之思平逃匿摘野桃食之核有文曰青昔思平拆之曰青乃十二月昔乃二十一日今楊氏政亂吾當以此日舉兵乎遂鳩黑㸑等三十七部討之是夜思平夢人斬其首又夢玉瓶耳缺又夢鏡破懼不敢進其軍師董伽羅解之曰公為丈夫去首為天玉瓶去耳為王鏡中有影如人有敵破則無影無影則無敵矣三夢皆吉兆也思平乃决天福二年十二月二十一日滅楊氏而有其位國號大理死僞諡太祖皇帝四傳至思聰為宋太祖建隆三年王全斌既平蜀欲因兵威取雲南以圖進太祖鍳唐之禍基於南詔以玉斧畫大渡河曰此外非吾有也自是雲南遂不通中國而段氏得以睨臨僰㸑以長世矣大渡河者今四川黎州是也段氏七傳至思亷為其臣楊義貞所弒嶽侯髙智升以兵討義貞滅之復立段氏之裔正淳為帝賞罰政令皆出髙氏段氏擁虛位而已宋紹聖間正淳遣使入貢求經籍得六十九家自是雲南多文學之士矣又十傳至興智而為元世祖所滅仍以其裔段實為大理總管尋授宣慰使至元五年以皇子忽哥赤為梁王都善闡今之雲南府是也至大德間中原板蕩梁王與段氏有隙至正二十三年明玉珍僣號于蜀將紅巾三萬攻雲南梁王走威楚諸部悉亂大理宣慰使段功以兵擊明玉珍敗之梁王深德段功以女阿􅀈主妻之奏授功雲南省平章功自是威望大著而梁王曲意承奉以故功戀戀不肯歸國其大理夫人髙氏寄樂府一章促之曰風捲殘雲九霄冉冉逐龍池無偶水雲一片緑寂寞倚幃屏春雨紛紛促蜀錦半閒鴛鴦獨自宿好語我將軍只恐樂極悲生寃鬼哭功得書既歸已而復往善闡梁人私語梁王曰段郎復來將吞金馬咽碧雞矣梁王疑之密召阿􅀈主付孔雀膽一枚令乘便毒殺功主不忍夜私與功曰我父忌阿奴願與阿奴西歸因出毒具示之功曰我有大造於爾家爾父待我甚厚何得有此主再三言終不聽明日梁王邀功東寺演梵令番將格死之主聞變失聲哭曰阿奴不聽吾言果有今日阿奴雖死奴不負信黃泉也欲自盡梁王守者萬方主愁憤作詩曰吾家住在雁門深一片閒雲到滇海心懸明月照青天青天不語今三載欲隨明月到蒼山誤我一生踏裏彩胡錦被名吐噌吐噌段阿奴吐噌華言可惜也施宗施秀同奴歹雲片波潾不見人押不蘆花顔色改押不蘆乃北方起死回生草肉屏獨坐細思量肉屏駱駝背西山鐵立霜瀟灑鐡立松林也而功之子寶女僧奴恆不忘復讐僧奴將適建昌華黎氏出手刺繡文旗以與寶曰我自束髮聞父寃恨非男子不能報此旗所以識也是年髙皇帝即位金陵改元洪武而梁王尚據善闡與元主相通復奏舉寶為雲南左丞未幾明玉珍復侵善闡梁王借兵大理寶答書曰殺虎子而還喂其虎毋分狙栗而自詐其狙公假途滅虢獻璧吞虞金印玉書為釣魚之香餌繡閨淑女設掩雉之網羅平章已亡兄弟罄絶止遺一􅋙一奴奴再贅華黎氏􅋙又可配阿􅗩妃如此事諾我必借兵如其不然待移金馬山為㸃蒼山昆明池為西洱池時來矣梁王見之恨寶入骨寶聞髙皇帝龍興奉表歸欵上降詔答慰之寶尋卒子明以洪武十四年繼為宣慰使壬戍春上遣潁川侯傅友德西平侯沐英將兵破善闡梁王把都鴆死段明懼乃馳書友德等其略曰大理乃唐交綏之外國善闡實宋斧畫之餘邦地莫能酬中國之郡邑民莫能列中國之營屯征之而徒勞甲兵寬之而海納鱗介乞依唐宋故事頒降雲南王印一顆大統厯一本律令一部比年小貢三年大貢則君臣之間兩無猜疑上下之分各安勞逸友德英怒撻辱其使諭令速降明再上書其略曰善闡危如登天大理險倍投海計如漢武習戰僅置益州莫能全土雄若世祖駐蹕只緣善闡分裂餘區自古以講和為上全師為竒大國既有其兵小國亦有其偹逮乎糧盡馬死將獨兵離為天下笑書後附以詩有方今天下平猶易自古雲南守獨難之句友德等大怒督兵並進明兵大敗擒俘京師雲南悉定分置府縣比之中州矣凡哀牢夷自仁果時立國傳世三十有四䝉氏自細奴邏立國稱王九世稱帝四世厯年二百五十鄭氏自買立國傳三世厯年二十有六趙氏楊氏俱不踰年段氏自思平立國傳世二十有二厯年三百一十有五又段實為宣慰使傳十世而我朝混一論曰嗟乎雲南在古荒服聲教弗漸自唐及宋則偃然僣竊睥睨巴蜀元雖開省設官而疆圉瓜裂以羈縻畜之逮乎我朝幅員混一僰㸑羅甸咸籍版圖可謂盛矣第其疆域厄塞華夷雜居時恬則蟻聚蜂屯有事則狼跳虎噉蓋負險始然也雲南臨安大理永昌鶴慶楚雄頗號沃壤元江臨安南通交趾金齒騰衝西擁闕瀾滄聨絡永寧麗江曲靖迤北而東彈壓烏蠻四境領要指掌可規矣諸夷之魁則元江武定景東麗江姚安北勝鄧川霑益並以兵力稱雄向背靡一蓋自麓川伏法而滇境稍寧惟尋甸一帶兵衛漸疏諸羅跋扈木邦孟密恃其險逺至今不聞悔禍咎在撫綏闕狀處置乖方莫可敉矣至於滇南北上必假道貴州萬一衝決何以越之聞滇池有徑可達馬湖武定可達建昌川陸具存而榛塞莫啓刋山通道之䇿所宜亟講也孟密孟養孟密者木邦宣慰司部落也木邦自國初納款授官與八百緬甸車里孟養諸酋競强鼎立而孟密有寶井為木邦利府陶猛司歪領之陶猛者猶華言頭目也宣慰使罕楪以其女曩罕㺯妻司歪罕楪死孫罕􅀢立嗜酒好殺曩罕㺯遂以孟密叛然猶未敢公侵木邦也成化初南寧伯毛勝守雲南墨孟密寶石許得自貢不關木邦太監錢能尤婪索無厭曩罕㺯遂怙勢縱橫略地自廣十六年太監王舉索寶石孟密曩罕㺯罵不與舉遂疏孟密叛木邦罪請征之曩罕弄大懼時大學士萬安幸用事而周賔五者江西人也逋孟密謂曩罕㺯曰無憂萬閣老貪聞天下又得權結昭德宫與萬皇親最厚若遣人齎重寶投之不止不征且得授官比木邦矣曩罕㺯從之遣人多齎金寶投安安許之召職方郎中劉大夏啖以美遷俾往撫處大夏辭曰某愚懦不任使安遂舉都御史程宗往以意授宗宗唯唯至雲南時巡撫都御史吳誠宗同年也言不可宗大怒曰萬公甚嗛汝敢復忤之誠憂悶不知所為發疾卒宗乃率鎮守及三司往撫孟密兾曩罕㺯出迓㑹曩罕㺯所遣安使歸已悉安意指益倨傲不見宗且曰我見都堂須坐講宗許之復曰我不得逺涉須都堂過自就我宗不得已至南牙山就見曩罕㺯坐定互講良久曩罕㺯曰我孟密之於木邦猶大象之孕小象也今小象長成軀倍大象矣寧能復納大象腹中乎宗曰然遂以所略木邦地畀之為設安撫司以司歪子孫世襲其職木邦人訴辨宗宗輒笞辱之曰朝廷畫土分封汝寧得専耶狀聞萬安大喜遂以宗巡撫雲南尋遷刑部尚書曩罕㺯既立遂盡奪木邦之地罕􅀢奔猛止由是孟養諸番大不平遣大陶猛倫索提兵衛罕􅀢聲言必滅孟密㑹敬皇帝即位安宗斥罷按察副使林俊復稍稍割孟密地還木邦曩罕㺯懼不敢逆命遂與木邦並立世讐殺矣孟養故宣慰使司也正統初宣慰使刁賔玉昏懦不能鎮輯諸夷部下貴姓酋思仁遂擁衆麓川叛孟養略取其地刁賔玉奔永昌死無子思仁益張遂屠騰衝據潞江自稱曰法法夷王號也事聞睿皇帝命黔國公沐晟左都督方政右都督沐昻往征之師次潞江思仁遣其將緬檢守江我軍不得渡先是刁賔玉嘗遣思仁質晟府晟兒子畜之乃遣使諭降思仁思仁陽許諾以故晟無渡江意緬檢數挑戰益急政不勝憤欲攻之晟不許政遂獨率麾下夜半渡江擊緬檢走之乘勝逼思仁上江頃之夷兵烏集政以旗牌取救於晟晟不遣曰渡江非我使也左右力諫晟乃以少兵往復逗遛政知晟無援意遂遣其子瑛過江還曰汝急歸吾死今日矣瑛叩首泣請同歸政拔劒叱之曰無多言將官死分也遂䇿馬馳夷兵馬躓夷兵攢刺為泥一軍皆沒無孑還者晟聞敗遂燒江上積餉披氊裘雜衆奔永昌布政使應履平按察使賴巽以狀聞上遣使者問罪晟自知不免乃遣人語使者曰吾主將也失律喪師不敢移罪他乞無問遂以冷水啖酥餅發病卒時廷臣皆以麓川稱叛以來國家芻糧之費百巨萬士馬死者無慮數萬宜放棄徼外以蘇吏民上猶豫未决太監王振方寵幸用事力勸上征之上乃遣兵部尚書王驥定西伯蔣貴益發湖廣四川廣西貴州及京營軍一十二萬往擊思仁敗之思闕割思仁所略孟養地畀緬甸購闕緬甸斬思仁縛其子思機歸驥送京師斬之緬甸以其子銀起莽居守孟養頃之麓川夷復擁思仁少子思祿攻銀起莽敗之復有孟養之地驥等慮師老餉道益艱賊終不殄滅遂約思祿許得部勒諸夷居孟養如故復與立石畫金沙江為界誓曰石爛江枯爾乃得渡思祿懼聽命乃班師以捷聞論功以王振從子一授錦衣衛指揮僉事驥封靖逺伯貴進定西侯以死事功贈政威逺伯諡忠毅晟定逺王諡忠敬晟政之敗在四年驥征始九年訖十三年乃罷思祿雖無官其豪僣夷中無異王者成化中太監錢能鎮守雲南大墨於諸夷思祿乃以祖母緑帶及諸珍物餌能能召見設飲食親與相對思祿稍稍縱橫𢎞治初詔以金牌信符給徼外土酋時孟養宣慰司廢除久矣兵部偶忘之以舊號頒給思祿遂以牌符號召諸夷曰天朝復官立我諸夷信之遂略取傍小邑自廣㑹孟密叛木邦事久不平參政毛科者素輕脫以平孟密自任或言須孟養兵乃可科遂檄兵思祿思祿輕科欲不與則憤孟密叛木邦得官與之則見弱乃以羸兵數千應科攻孟密孟密笑曰毛官人欲以孟養殺我我姑以一命兑之遂介馬來衝孟養兵原無鬭志大敗孟密設伏邀擊殱什七八科僅以身免思祿大怒遂違誓渡金沙江攻孟密取蠻莫等十七寨時都御史金獻民巡撫雲南聞變欲劾科科以計解尋稍謫貴州按察司副使思祿既違誓渡江遂不可制大學士謝遷科同鄉也科復挾遷勢干獻民獻民復奏舉科曰臣聞使功不如使過撫治孟養非科不可朝議許之復以科為雲南按察使副使科遂勸獻民請兵大舉上不許㑹思祿亦遣人奏言絶域小醜本無叛情第為鄰惡詿誤以干天法願入蠻莫十七寨贖罪得比米魯乞以一子為土官復宣慰如故大學士劉健欲許之以為思祿有官猶可制即無官其僣自若也不如因而官之遷復以科故勸劉公弗許思祿遂據孟養自立論曰孟密孟養之亂譬諸蔓草樹以中官而灌以閣輔日益滋長雖欲芟刈不可得矣麓川之役舉朝皆以為非謂王振專權逞忿而李文達公亦言麓川初叛不委晟而遣别將遂至喪師此皆失實潞江致敗晟實罪魁第朝議以晟元勳之裔闢土安南有功復畏法引慝自殞得䝉贈諡亦已幸矣思仁抗王師殱大將釋而不誅辱國益甚振之罪惡通天若主征麓川義正言順不可非也三原王公撰忠敬王廟碑其言亦與文達略同溢美文過為家狀所䝉第未知國史所傳竟何稽也蠻夷苗人古三苗之裔也自長沙沅辰以南盡夜郎之境往往有之與氐夷混雜通曰南蠻其種甚夥散處山間聚而成村者曰寨其人有名無姓有族屬無君長近省界者為熟苗輸租服役稍同良家十年則官司籍其戶口息耗登於天府不與是籍者謂之生苗生苗多而熟苗寡其俗各以其黨自相沿襲大抵懻忮猜禍絶禮讓而昧彛倫惟利所在不顧亷耻喜則人怒則獸睚眦之隙遂至殺人被殺之家舉族為讐必報當而後已否則親戚亦齗齗助之即抗剄不悔諺云苗家讐九世休言其不可居解也其人魋結跕屣陟嵓穴躐荆棘捷如麖麞斑衣左袵或無襟禬竅以納首别作兩袂急則去之插雞尾於顛負蘭抱弩遇便輒鹵掠狶突箐中不可疏捕未娶者以銀環飾耳號曰馬郎婚則脫之婦人雜海􅚔銅鈴藥珠結纓絡為飾處子行歌于野以誘馬郎淆淫不禁仲春刻木為馬祭以牛酒老人並馬箕踞未婚男女吹蘆笙以和歌淫詞謔浪謂之跳月中意者男負女去論妍媸為聘資贏縮貧而逋者遞嵗索之即髮種種長子孫不貸也飲食惡草以蕎灰和秫粥釀為臭瀋以魚肉雜物投之曰䤃蛆蚋叢嘬以為珍具矜富羡者則曰蓄䤃桶幾世矣嵗時召親戚撾銅鼓鬬牛於野刲其負者祭而食之大臠若掌以牛角授子孫曰某祖某父食牛凡幾要約無文書刋寸木判以為信爭訟不入官府即入亦不得以律例科之推其屬之公正善言語者號曰行頭以講曲直行頭以一事為一籌多至百籌者每舉一籌數之曰某事云云汝負於某其人服則收之又舉一籌數之曰某事云云汝凌於某其人不服則置之計所置多寡以報所為講者曰某事某事其人不服所為講者曰然則已不然則又往講如前必兩人咸服乃决若所收籌多而度其人不能償者則勸所為講者擲一籌與天一與地一與和事之老然後約其餘者責負者償之以牛馬為算凡殺人而報殺過當者算亦如之言語侏㒧甚者重譯乃解與其曹耦善厚者曰同年同年之好踰於親串與漢人善者亦曰同年稱其酋長曰茫稱人曰歹自稱亦曰歹猶晉之言咱吳之言儂也不知正朔以鼠馬記子午言日亦如之嵗首以冬三月各尚其一曰開年占卜以雞骨進之視其璺以斷吉凶或折茅為兆病不服藥禱鬼而已不愈則曰鬼所嫉也棄之不顧謂其巫曰鬼師死喪無服或葬或不葬大抵諸苗之俗婚姻略同而喪祭異善為蠱毒蠱無形而毒有物中之皆能殺人或言蠱有神熠耀若月以昏暮流人家為祟以其日作蠱浹辰而出之以中生人則已無生人則主人以其身服蠱解而哇之否則神將蔓殃於其室其在金筑者有克孟牯羊二種擇懸崖鑿竅而居不設裀笫構竹梯上下髙者百仭耕不挽犁以錢鎛發土耰而不耘男女屣笙而偶免乳而歸其聘財親死不哭笑舞浩唱謂之閙尸明年聞杜䳌聲則比屋號泣曰鳥猶嵗至親不復矣在獨山為九名九姓苗狙詐而叨詖以元日為把忌􅖏門不出二七而解犯之者以為不祥烏羅著可以三月一日為忌二十五日而解在平樂為紫姜苗嗜殺尤甚得讐人即生啖其肉夫死其妻嫁而後葬曰喪有主矣在白納為賣爺苗其俗賤老而貴少父老則拽而鬻之在葛章葛商為短裙苗以花布一幅橫掩及骭在牂牁之間為八番子其俗勞女而逸男以虎馬日為市夜臥必圍爐厝火不施衾枕燕㑹擊長腰鼓為樂以十月望日為嵗首葬不擇日以夜靜出之云不忍使其親知也在陳䝉爛土為黑苗又為夭苗緝木葉以為上服女子甫十嵗即構竹樓野外處之以號淫者人死不葬以藤蔓束之樹間而已此皆苗俗之大略也蓋諸苗所居必深山僻谷生而不見外事故其俗不移無公家更賦之給故其民惰縵土無疆果蓏蟲蟻食物常足故皆啙窳偷生而亡積聚不通文字絶先王禮義之教故枝柱淫佚與鳥獸同歸亦可憫也羅羅本盧鹿而訛為今稱有二種居水西十二營寧谷馬場漕溪者為黑羅羅亦曰烏蠻居慕役者為白羅羅亦曰白蠻風俗略同而黑者為大姓羅俗尚鬼故又曰羅鬼蜀漢時有火濟者從丞相亮破孟獲有功封羅甸國王即今宣慰使安氏逺祖也自羅甸東西若自杞夜郎牂牱則以國名若特磨白衣九道則以道名皆羅羅之種也羅羅之俗愚而戀主即虐之赤族猶舉其子姓若妻妾戴之不以為讐故自火濟至今千有餘年世長其土勒四十八部部之長曰頭目其人深目長身黑而白齒椎結跣蹻荷氊戴笠而行腰束葦索左肩拖羊皮一方佩長刀箭箙富者以金釧約臂悍而喜鬬修習攻擊雄上氣力寬則以漁獵伐山為業急則屠戮相尋故其兵常為諸苗冠諺云水西羅鬼斷頭掉尾言其相應若率然也亦有文字類䝉古書者坐無几席與人食飯一盤水一盂匕一枚抄飯哺許摶之若丸以匕躍口食已必滌臄刷齒以為潔作酒盎而不縮以蘆管啐飲之男子則剃髭而留髯婦人束髮纒以青帶蒸報旁通靦不恧也父死收其後毋兄弟死則妻其妻新婦見舅姑不拜裸而進盥謂之奉堂男女居室不同帷笫潜合如奔狠而多疑忌相賊也白羅羅之俗略同而飲食惡草盛無杯盤㸑以三足金灼毛齰血無論鼠雀蚳蝝蠕動之物攫而燔之攢食若彘不通文字結繩刻木為信女子以善淫名者則人爭取之以為美也人死以牛馬革裹而焚之居普定者為阿和俗同白羅以販茶為業犵狫一曰犵獠其種有五蓬頭赤腳矯而善奔輕命而死黨觸之則糜沸而起得人片肉巵酒即捐軀與之蹈奔湯火以布一幅橫圍腰間旁無襞積謂之桶裙男女同制花布者為花犵狫紅布者為紅犵狫各有族屬不通婚姻殮死有棺而不葬置之崖穴間髙者絶地千尺或臨大河不施蔽蓋以木主若圭羅樹其側號曰家親殿在平伐者為打牙犵狫栗悍尤甚善斂百物之毒以染箭刃當人立死觸其氣者亦死父母死則子婦各折其二齒投之棺中云以贈永訣也在新添者為剪頭犵狫男女蓄髮寸許人死則積薪焚之又有猪屎犵狫者喜不潔與犬豕同牢身面經年不靧得獸即咋食如狼狇狫其俗與犵狫略同掘地為爐厝火環卧不施被席以牛衣藉之死則男女羣冡俯尸而瘞之云為死者避壓也𦍕獚一曰楊黃其種亦夥石阡施秉龍里龍泉提溪萬山之界往往有之生理茍且荆壁四立而不塗門戶不扃出則以泥封之男子計口而耕婦人度身而織暇則挾刀操笱栁以漁獵為業元宵端午架鞦韆羣戲遂以淫奔把忌以三月之朔父母之死則焚其衣服殕其牛馬云若葬鬼者然狆家椎􅡫屣屩不通文字好為樓居飲食匙而不策衣裳青色婦人以青帛䝉髽若冒絮之狀長裙細績多者二十餘幅拖腰以彩布一方若綬仍以青衣襲之在室奔而不禁嫁則絶之喪食尚魚蝦而禁禽獸之肉葬以傘蓋墓期年發而火之祭以枯魚以十二月為嵗首俗尚銅鼓中空無底時時擊以為娛土人或掘地得鼓即譸張言諸葛武侯所藏者富家爭購即百牛不惜也宋家蔡家蓋中國之裔也相傳春秋時楚子往往蠶食宋蔡俘其人民放之南徼遂流為夷二氏風俗略同而宋家稍雅通漢語或識文字勤於耕織男子帽而長衫婦人笄而短裋將嫁男家遣人往迎女家則率親戚箠楚迎者謂之奪親既歸旦則進盥於姑舅夕則燂湯請洗三日而罷喪葬飯蔬飲水二十一日封而識之若馬鬛者蔡家在底寨者與宋家同俗故世世連婚在養龍坑者無異苗人男女吹木葉而索偶人死不哭繞尸而歌謂之唱齊尨家蓋徙筰駹氏之裔訛為今稱其種有四在康佐者獨蕃恣睢懷諼難與約束好依深林薦莽之間徂伺圉奪急則鼠竄貪而善讐常以杯羮為人奔命責逋負秒忽不能第忍近溪者善入尾灑擉魚鱉猾若蟂獺尾灑者猶華言水下也男子束髮而不冠婦人斑衣以五色藥珠為飾貧者以薏苡代之春時立木於野謂之鬼竿男女仔旋躍而擇對既奔則女氏之黨以牛馬贖之方通媒妁醜者終身無所取售人死以杵擊椎塘和歌哭椎塘者臼也舁之幽嵓祕而無識以七月七日祭其先塋龍家與狆家同俗而衣尚白喪服則易之以青婦人緇布作冠若馬鐙加髻以笄束之在寧谷西保之間者多張劉趙三姓一曰大頭龍家男子以牛馬鬃尾雜髮而盤之若蓋以尖笠覆之一曰狗耳龍家婦人辮髮螺結上指若狗耳之狀亦曰小頭龍家其俗與康佐同冉家卭筰冉氏之裔今酋陽烏羅部落之長多冉姓者一曰冉家蠻詬之曰南客子其俗散處于沿河佑溪婺川之間跋扈不譓尚武而善獵得獸必祭而後啖之地有沙坑深者十五六里昏黑不辨咫尺土人以皮帽懸燈而入鑿崖石而採之白石若礬謂之砂床其良者若芙蓉箭簇􅉡􅉡迸落如榴房之解也碎者末以燒汞為硃謂之新紅民間貿易用之比錢楮焉坑中往往得敗船朽木莫測所自朱汞有毒氣能殺人採砂汞滿三年者多死人言飲丹井者夀又言術士能凝汞成銀鍊砂成金服之可以飛升此皆幻妄乃今採者纍纍橫死無算也仙夀之說安所徵哉僰人漢為犍為部唐為于矢部蓋南詔之東鄙也古者有罪流之西方曰僰言使逼寄于夷也其人善事佛男女手數珠持番呪祈禱輒驗多有削髮為僧者號曰提奢稍淳而易治聲音風俗與南詔略同謂虎曰金波羅峝人一曰峝蠻散處于牂牱舞溪之界在辰沅者尤多言語侏㒧尚讐而喜殺惰於耕作男子科頭徒跣或趿木履以鏢弩自隨暇則吹蘆笙木葉彈二絃琵琶臂鷹逐犬為樂婦人短裙長袴後垂刺繡一方若綬胸亦如之以銀若銅錫為錢編次繞身為飾富羡者以金環綴耳纍纍若貫珠也溽暑男女羣浴於河冬月以茅花為絮男女仔拋毬相謔偶意者奔之謂之偷香飲食不食鹽醬人死以尺帛裹頭為服爭訟不入官府以其長論决之號曰鄉公猺人古八蠻之種也五溪以南窮極嶺海迤連巴蜀皆有之椎結斑衣兒時燒鐵石烙其跟跖以油臘洗之重趼若鞹兒始生稱之以鐵如其重漬以毒水及長煆而為刀終身用之試刀必斬牛仰刀牛項以肩負刀一負而殊者良刀也婦人黥面為花卉蜻蛚蝴蝶之狀踏歌而偶奔者入嵓峝插栁避人嫁則荷傘懸草履一兩從入夫家示行色也採竹木為屋綢繆而不斷繩樞篳竇覆以菁茅樹蓄粟豆羊牛雜以為餉不足以山伐獵獸而續之燔㸑草具茅血淋漓雖富者亦惟多釀酒時時沉酗為樂耳不知世有珍羞之和黼黻之華也山田瘠埆十嵗五饑急則隳突漢界持短鎗控大弩毒矢攻剽墟落踉蹌篁薄中飄忽往來不可踪跡拒敵則比耦而前執鎗者前却不常以衛弩執弩者口銜刀而手射人矢盡便投弩挾刀與鎗俱奮山中多杉板滑石膽礬茴香草果檳榔諸藥物時時竊出市博魚鹽又多散地肥而多稼四方亡命若逋徭賦者此焉逋藪淆雜夷中為之通行囊槖鄉導分受鹵獲結黨既夥則公墮城堡劫官寺故廣之東西嵗苦兵事諺云比年小征三年大征然亦厪矣史氏槃瓠之說雖恍幻難稽然猺人多槃姓者或訛而為盤云猺獞雖異族而信鬼畏誓大略相同在唐虞謂之要服蓋以信義要質而已秦時與板楯蠻盟曰秦犯夷輸黃龍一雙夷犯秦輸清酒一鍾夷人安之宋時范成大帥廣西時令諸猺團長納狀云某等既充山職今當鈐束家丁男行持棒女行把麻任從出入上有太陽下有地宿翻背者生兒成驢生女成猪舉家絶滅不得對好翻非偷寒送暖上山同路下水同船男兒帶刀一㸃一齊同殺盜賊不用此欵者並依山例山例者殺戮也自是帥事二年諸猺無及省界者獞人五嶺以南皆有之與猺雜處風俗略同而生理一切陋簡冬編鵝毛雜木葉為衣摶飯掬水而食居室茅緝而不塗衡板為閣上以棲止下畜牛羊猪犬謂之麻欄善為毒矢射人物中者焦沸若炙肌骨立盡雖猺人亦重畏之不敢忤視又善為蠱毒五月五日聚百蠱於一器令自啖食存者留之持以中人無不死者又為飛蠱一曰挑生一曰金蠶皆鬼屬而毒人事之可以驟富害人者類于飲食內之令人心腹絞痛靣目青黃吐水而脈沉含黑豆脹而皮脫嚼之不腥易以白礬其甘若餳治之以歸魂散雄硃丸在胸鬲則服升麻吐之在腹則服鬱金下之聚而成村者為峝推其酋長曰峝官峝官之家婚姻以豪汰相尚壻來就親女家於五里外結草屋與居謂之入寮兩家各以鼓樂迎男女至寮盛兵為偹小有言則兵刃相接成婚後妻之媵婢忤意壻即手殺之自入寮能多殺媵婢則妻黨畏之否則謂之懦半年而後歸夫家人逺出而歸者止於三十里外家遣巫提竹籃迓脫歸人帖身衣貯之籃以前𨗳還家言為行人收魂歸也親始死被髮持瓶罋慟哭水濵擲銅錢紙錢于水汲歸浴尸謂之買水否則鄰里以為不孝獠人古稱天竺咳首僬僥跛踵穿胸儋耳狗軹旁脊謂之八蠻其支而尤異者則有飛頭鑿齒鼻飲花面白衫赤裩之屬今嶺表左右及海外諸國在在有之而儋耳交趾遂以名郡其俗各以其黨沿習不一好依深山積木以居名曰干欄以射生為活雜食蟲豸以鼠子未毳者啖以崖蜜嚼之跳躍唧唧有聲號曰蜜唧以為珍具無版籍部勒每村推其長有智者役屬之號曰郎火父死子繼餘稱提陀提陀者猶華言百姓也嵗首則郎火以土杯十二貯水隨辰位布而禱焉經夕集衆往觀若寅有水而卯涸則知正月雨而二月旱餘俗大略與猺獞同而好殺尤甚父子有隙手刃者先之若殺其父走避於外得一狗以謝母然後敢歸毋得狗謝不復嫌恨報讐相擊必食其肉而卧其皮所殺之人美鬚髯者㓟其面而籠之竹木鼓噪而祭之以徼福利黎人塢蠻也今為瓊崖儋萬四州治黎有生熟二種生黎有名無姓不受約束熟黎慕化服役稍同編氓多符王二姓其地有五母山山之中皆黎族盤據聚而成村者曰峝峝各有主父死子繼夫亡妻及男子文身椎結挾刀控弩婦人戴篛笠斕衣有裙而無袴春時笄女戲鞦韆以誘散子攜手踏歌名曰作劇女伴互施針筆涅兩臉為蟲蛾花卉名曰繡面以色絲和吉貝雜織為錦釀酒多雜榴花地産水沉龍涎犀象翡翠珠璣異物親死不哭啖生牛肉以表哀痛葬則舁襯而行前以雞子擲地不破即為吉穴也客至未識者主人穴隙窺之客儼然矜莊始遣奴布席客坐移時主人乃出不交一言少選置酒先以惡草具進客食不疑乃喜更嘉肴欵曲即親串髙㑹不脫兵仗三爵後請各弛備然終不離酒所謦咳為忤便握刃相戕時時剽剠省界為害也蛋人瀕海而居以舟為宅或編篷水滸謂之水欄以漁釣為業辨水色以知龍居故又言龍人善氽水採珠螺以繩引石縋人而下手一刀以拒蛟龍之觸得珠螺則以刀擊其繩舟人疾引而出之稍遲則氣絶矣馬人本林邑蠻相傳隨馬援北還散處南海其人深目猳喙以採藤捕礪為業或曰盧循遺種也故又云盧亭云論曰嗚呼諸蠻之俗醜惡不足録録之亦有深意焉堪輿乍分函夏之地黎首蠢蠢與鳥獸無異五帝三王賢聖遞作奬掖以仁義陶鎔以禮樂而匡弼以刑罰然後人知衣冠之華而彛倫之重其在四裔魑魍之與逰豺狼之與居仁義禮樂之教刑罰之政曽未目覩猶之函夏之初何怪其俗之醜惡也夫風氣人文相依周轉振古以還四隅之地西北為首東北次之東南又次之西南其最後者也周初封箕子於朝鮮即為嘉域而淮徐之區擯為戎敵太伯端委以治吳猶不革文身裸飾之俗秦漢開百粵而武帝以閩夷叛亂徙其民於江淮之間空其地其時固薦莽狐兔之墟也乃今聲華文物與中州等矣武帝遣唐䝉通夜郎閉於昆明元始拓土然直羈縻之而已我朝龍興始列郡縣而西洋海國亦皆賔貢蓋氣化漸開則人文漸被若旋風之披拂首西北而終西南者之明驗也焉知百世之後滇𤏡之地不有聲華文物如閩廣之交者乎又焉知八百車里緬甸諸夷不有列郡縣置官吏之日乎炎徼紀聞卷四
