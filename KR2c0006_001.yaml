body:
  text: 炎徼紀聞卷一明田汝成撰岑猛岑猛者廣西田州府土官也自敘漢舞隂侯岑彭後宋元間世為安撫總管等官洪武初岑伯顔以田州歸附髙皇帝嘉之為立府治使世襲知府三傳而溥為知府溥二子長猇次猛𢎞治六年九月猇以失愛弒溥江中土目黃驥李巒發兵誅猇既而驥巒有隙驥以猛奔梧州督府奏猛襲溥官納之田州兵備副使汪溥慮巒方命乃檄思恩知府岑濬以兵衛猛濬方豪舉行兩江驥遂賂濬脅猛分地畀驥始兵往猛不得已而從之比至田州李巒拒不納驥復以猛奔思恩十一年都御史鄧廷瓚檄濬歸猛濬不從尋遣副總兵歐磐布政使程廷珙以兵徵之濬始釋猛督府納之田州與濬構釁不可居解是年七月濬入田州殺李巒十五年十月濬陷田州猛走免濬偽以族子洪守田州十八年都御史潘蕃等疏濬罪狀詔發湖兵一萬討濬濬敗死族誅改流官知府降猛福建平海所千戶正德初猛賂太監劉瑾矯詔以猛為田州府同知猛撫輯遺民兵威復振稍稍侵旁郡自廣復冀軍功序遷知府為重乃言督府征調願為先鋒而督府旗校至田州者猛率厚賂結歡譽猛者藉甚會江西華林洞賊反都御史陳金檄猛從征猛兵沿途剽掠民皆徙村避之為之謠曰華林賊來亦得土兵來死不測黃狐跳梁白狐立十家九家邏柴棘頃之賊平金疏猛功伐稍遷指揮同知猛授官非始願怨望驕蹇而督府旗校又不得攫賂如曩時于是浸潤毁猛而猛復恃其兵力凌轢諸土官平生睚眥怒必報當而後已或言猛蓄不軌都御史盛應期持此惴猛冀墨其資猛顧發舒出不遜語應期恚恨疏猛旦暮必反狀請征之未報應期去位而都御史姚鏌代之鏌雅知猛無反心欲不舉而鏌子淶亦以書諌請勿征時巡按御史謝汝儀與鏌有隙故事御史謁督府從掖門入汝儀直入儀門鏌眴從官却之汝儀大怒亷得淶書誣淶納猛萬金鏌皇恐乃再疏請征猛詔曰可嘉靖五年四月鏌偕總兵官朱麒等發兵八萬以都指揮沈希儀張經李璋張佑程鑒等五將軍統之分道並進猛謂其部下曰岑氏世荷天朝有罪可乞憐免也兵至毋交鋒乃裂帛書狀陳君門言蟣虱小臣非有他意惟天官察之鏌不聽督兵益急猛長子邦彥守工堯隘沈希儀擊斬之諸軍繼入猛懼謀出奔而歸順州知州岑璋猛婦翁也其女失愛屏居璋欲藉此報猛乃甘言誘猛走歸順鴆殺之斬首歸官軍語在璋傳先是猛三子邦彥敗死邦佐出後其族武靖州知州邦相亡不復而邦彥側室子芝褓匿民間鏌見岑氏單弱計田州可遂滅乃陳狀疏請流官治田州上從之未幾田州土目盧蘇糾思恩土目王受等挾邦相反兩江皆震會御史汝儀滿去御史石金代之金黨汝儀而左布政使嚴紘僉事張邦信又素不為鏌所喜紘遂倡言猛實不死歸順偽以肖猛者當之又言有自右江來者聞思恩已陷岑猛糾交址叛臣莫登庸反矣省城旦暮不保靖江諸宗室洶洶流言有挈家奔避者金遂劾鏌罔上寡謀攘夷無䇿圖田州不可得并思恩而失之上大怒以璽書切責鏌落職而吏部侍郎桂蕚言提督兩廣非新建伯王守仁不可上從之敕守仁兼兵部尚書總制兩廣江湖四省軍務時守仁家居鏌守代未去欲徵兵平田州自贖乃檄兩廣三司議軍事而張邦信分巡蒼梧欲隂壞其事紿郵吏發檄東西交竄之頃之兩廣三司皆以檄非是白事鏌大怒疑左右胥掾所誤也呼曰吾事敗矣竟鬱鬱守代六年十一月守仁至蒼梧時諸夷聞守仁先聲皆股辨聽命而守仁顧益韜晦見田州已張岑氏不可遂滅乃以明年七月至南寧使人約降蘇受蘇受許諾而以精兵二千自衛至南寧投見有日矣而守仁所愛指揮王佐門客岑伯髙雅知守仁無殺蘇受意使人言蘇受須納萬金丐命蘇受大悔恚言督府誑我且倉猝安得萬金必欲萬金有反而已守仁有侍兒年十四矣知佐等謀夜入帳中告守仁守仁大驚達旦不寐使人言蘇受毋信讒言我必不殺若等也蘇受疑懼未決言來見時必陳兵衛守仁許之蘇受復言軍門左右祇候須盡易以田州人不易即不來見守仁不得已又許之蘇受入軍門兵衛充斥郡人大恐守仁數之論杖一百蘇受不免甲而受杖杖人又田州人也諸夷皆驚莫測守仁意指守仁乃疏言思田搆禍荼毒兩省已踰二年兵力盡於哨守民脂竭於轉輸官吏罷於奔走地方臲卼如破壞之舟漂泊風浪覆溺在目不待智者而知之必欲窮兵雪憤以殱一隅未論不克縱使克之患且不守况田州外捍交址內屏各郡深山絶峪猺獠盤據盡誅其人異日雖欲改土為流誰為編戶非惟自撤其藩籬而拓土開疆以資鄰敵非計之得也令岑氏世效邊功猛獨詿誤觸法雖未伏誅聞已病死臣謂治田州非岑氏不可請降田州為州治官其子邦相為判官以順夷情分設土巡檢以盧蘇等為之以殺其勢添設田寧府統以流官知府以總其權又言文臣如左布政使林富宜為巡撫武臣如都指揮同知張佑宜為總兵上皆嘉納從之守仁既罷田州之役遂移兵率盧蘇等攻八寨賊破之復上言盛稱蘇受等功伐時兵部侍郎張璁及桂蕚等已浸淫毁守仁處田州非是上頗疑焉會守仁薨而都御史林富代為提督富奏言田州疆理險厄外屏南蠻若改設流官則邊防之守我獨當之𢎞治間岑濬絶後改設流官二十年來叛者數起縻費財力不可勝言田寧之事為鑒不逺思恩是也臣議以為田州宜降州治不必再設府治以騷逺夷朝議許之乃以岑邦相為判官以張佑充副總兵鎮守其地敕曰滿三年乃代時邦相才十五六佑兒子畜之而盧蘇自矜興復岑氏有功專制生殺威行部中號曰布伯布伯者猶華言主管也邦相擁虛位而已遂與盧蘇有隙十一年二月佑任滿將詣督府求代意已與邦相有父子恩錢贐必腆比行邦相治具供帳僅值二百金佑大怒潛語盧蘇盧蘇曰仔誠無狀主公何不庭撻之佑言慮變盧蘇曰老奴在何敢也明日佑遂以他事下撻邦相盧蘇陽頓首請免邦相知非由衷也愈益恚恨蘇蘇遂與佑比而批格邦相時邦彥之子芝髫齔矣佑搜得之育之别室邦相時時欲購殺之會佑不果代留鎮得免是年十一月督府以西山之役檄佑從征佑遂置芝衣篋以行而邦相復供帳甘言謝佑行毒酒中既罷而邦相覺芝亡追捕弗及佑以芝奔梧州都御史陶諧亦兒子畜芝時時召飲食明年二月佑毒發死十三年六月盧蘇遣其黨黃對刺邦相弗克邦相遂與土目羅玉戴慶謀伐盧蘇盧蘇覺之稱疾不出會其妻生日諸土目率妻子來賀遂入問疾蘇伏甲寢中諸土目曰布伯何疾苦幸強飯自愛蘇曰賴公等之靈疾苦何足恤惟旦夕首領不保耳諸土目曰布伯何故出此言一州人誰不延頸願為布伯死者蘇曰噫安敢望州人也但得公等同心緩須臾死足矣諸土目覺蘇話言非是皆應曰誰敢不同心者蘇因指羅玉戴慶謂諸土目曰公等雖同心如二豎何言訖而甲興執玉慶座中斬之因劫諸土目曰主人之不德公等所知也孺子芝實岑氏嫡裔不於此時樹立後難圖矣諸土目皆懼頓首曰敢不惟命蘇曰須公等留妻子為質即日以甲士千人劫諸土目偕攻邦相執而囚之九月盧蘇殺邦相焚其尸行賂都御史諧言邦相病死無後芝當敘立謹率州人合辭以請諧遂縱芝歸田州寢其事不問于是猛仲子邦佐爭立而鎮安府土舍岑真寶泗城州土舍岑施東蘭州土舍韋起雲那地州土舍羅廷鳯等咸憤盧蘇以僕殺主也合兵助邦佐攻田州入之殺掠萬人盧蘇僅以身免而歸順州土舍岑瓛蘇壻也蘇急求救於瓛瓛遂乘虛搗鎮安真寶聞之引兵去盧蘇追躡擊之真寶大敗精兵死者八千人兩江大駭諧乃遣人諭真寶等曰邦相實病死何與盧蘇而爾等自相魚肉何也會諧以憂去都御史潘旦蔡經相繼代之咸不欲反諧前議將以邦相病死聞且曰田州肄孽遞起黎民塗炭府藏空虛假令朝廷復以盧蘇故問罪興師嶺右之禍安可敉也于是副使蕭晚左參議陳大珊當勘議曰盧蘇敗略稱亂殺主戕民罪惡通天安可蓋也今日之事第當直敘以聞乞令立功自贖不及征討足矣督府不聽遂言邦相不孝奪其母贍田虐部下盧蘇因衆怨而殺之朝議果置蘇不問于是兩江土官咸拊膺歎曰殺人不抵弒主無刑吾輩手足腎腸皆懸僕妾矣十七年藤峽之役兩江土官咸集而盧蘇與其子鳯以兵從屬指揮王良輔部下軍興蘇鳯故逗遛不進且紿良輔軍於他所而父子自為一軍多縱賊逸去良輔以狀白監軍副使翁萬逹萬逹密與副總兵張經及汝成謀曰峽賊雖當誅不過殺人剽貨耳盧蘇之罪十倍峽賊釋此不誅而首誅峽賊何異舍豺狼而責狸鼠也吾欲與公等倡義斬之何如經汝成曰僕等抱心久矣與公協謀幸甚然為之奈何萬逹曰向武州土舍黃仲金者盧蘇之宿黨也近聞有恨於盧蘇而黨於岑芝召而圖之無不可者經等曰然乃召仲金語故仲金叩頭曰小人抱心久矣若得軍門主張當斬此賊于萬衆之中令其軍帖然不動經等遂與歃血為盟而隱之乃為書暴蘇罪亂狀言于督府曰田州頭目盧蘇黨逆猛搆亂荼毒兩江猛誅蘇復結王受稱兵再謀不軌迫逐守臣攻陷旁郡姚中丞討之而未終王新建撫之而有待豈期新建尋故大憝逋誅海內扼腕蘇獸心益肆悔艾罔聞敢以睚眥之讐弒其主邦相往時諸夷猶知主僕名分忌不敢於今則滅裂綱常厲階為梗兹者藤峽之役分道進攻紫荆諸巢實其吭背須得鋭甲乃可成功初以蘇懲創之餘必盡死力分隸首隊企有悛心不意豺狼之資傲狠如故藐視軍令違限五晨及至屯軍左次便地賣路縱賊幾敗膚功若不殱此老姦則兩江土官誰肯用命况倡議發難實自其心腹黃仲金為之非某等所能強迫也仲金識事體聽其言有竒氣內訌外掎萬萬無慮不然彼亦豈肯蔑身家而履竒禍輕然諾以讐黨與哉事出有名機不可再惟明公圖之都御史經閲書大駭報曰今日之事受命征峽賊不聞取盧蘇何監軍之多事也即日遣旗牌星馳營中坐鎮於是機事頗泄而盧蘇夜遁萬逹頓足歎曰惜哉愚也悔不先發後聞耳論曰嗚呼豫涉廣西聞父老言田州事未嘗不三歎馭夷之失䇿也國家以土官治南蠻蓋周人疆以戎索之意自韓襄毅公之後而軍門號令漸已不張要皆自取岑猛倚強跋扈罪誠有之誅其君而弔其民誰曰不可應期始以私望當猛大逆何以服其心也盧蘇倡亂抗敗王師雖八議不宥新建伯受鉞專征總制四省撲殺此獠直拉朽耳而顧以姑息訖事何哉副使翁萬達曰新建伯之將薨也豫適侍側言田州事非我本心後世誰諒我者而參將余恩亦言田州乃陽明公未竟之功然岑猛實伏誅而疏言病死蘇受大憝漏網而盛稱其功此何解也逮乎盧蘇再叛弒主犯諸酋之怒當是時諧肯以一札詰之正名其罪可不遺隻鏃費斗糧而此獠虀粉矣蔽姦罔上失諸夷心彼其人寧復顧國家大體哉若夫紘金汝儀邦信讒妬參合誣人以逞直苛妎淺夫不足責矣豫又聞員外郎吳鼎曰新建伯之起用思田也蓋桂蕚之力居多云蕚自以遭時際主致位輔宰非立竒功不足賈重後世會安南有亂冀可傳檄取之乃隂以意指授守仁若專為思田出者使密探安南要領而守仁竟忤蕚指直於奏尾稍稍及之蕚遂恚憾會守仁物故而以他事發怒詘其名嗚呼使其然譎祕又何如也岑璋岑璋者歸順州土官也多智略善養士兵冠右江時岑猛以不法獲譴督府奏猛反狀請令諸土官能擒馘猛者賜千金秩一級畀其半地黨助者連誅之敕曰可既而都御史姚鏌將舉兵慮璋以婦翁黨猛召都指揮沈希儀問計希儀雅知璋女失寵恨猛有隙乃對曰願主公按兵旬日當探領要以復也鏌許諾希儀既出而部下千户趙臣者雅善璋希儀召趙臣問計曰吾欲役璋以破猛若何臣對曰璋多智而持疑誠直語之必不信可以計遣難以力役也希儀曰計將安出臣曰鎮安歸順世讐也公使人歸順則鎮安疑使人鎮安則歸順疑公若遣臣徵兵鎮安璋必邀臣詢所以臣以死漏泄端倪可動也希儀曰善乃帖臣徵兵鎮安而臣枉道詣璋所璋見臣來喜迓曰久不見趙君亦肯念我來耶臣故默然若不豫色者璋曰趙君嗔乎臣曰肺腑之交契濶之想安所嗔也稍語須臾歎息而起璋疑之明日璋置酒欵臣臣愈益默然璋曰怪哉趙君軍門過督我耶臣曰不然璋乃挽臣卧室跪叩之臣澘然淚下璋亦泣下曰嗟乎趙君璋今日死即死耳君何忍祕厄我臣乃言曰與君異口駢心有急不敢不告今日非君死即我死矣璋曰何故臣曰軍門奉旨征田州謂君以婦翁黨猛將檄鎮安兵襲君我不言君必死矣我言之而君驟發敗機事我必死是以泣耳璋大驚頓首曰今日非趙君我且赤族矣遂強臣稱病留傳舍而亟遣人馳希儀所備陳猛反狀恐波及願設計自效希儀許之遂以白鏌鏌大喜不復疑璋而專意攻猛勒兵五道以都指揮沈希儀李璋張佑程鑒張經等將之而參政胡堯元等分道督進猛子邦彥守工堯隘璋遣兵千人助邦彥曰聞天兵至將以姻黨誅我今日義同死不忍坐仆此皆精兵可當一面者邦彥欣納之璋復遣人潛告希儀曰謹以千人內應矣皆寸帛綴裾裏鏖戰時當扱示幸天兵擇舍之希儀許諾時田州兵殊死守戰諸將軍莫利當隘者希儀獨引兵當之約戰三合希儀以竒兵千餘騎間道繞隘側旗幟閃閃而不覿歸順兵大呼曰敗矣敗矣天兵間道入矣田州兵驚潰希儀麾兵乘之風披斬首數千級邦彥死焉猛聞敗欲自經而璋先已築别館僻隈美女妖童牲榖咸備至是使人詣猛曰事急矣願主君走歸順三四夕可抵交南再圖興復未晚也時猛倉皇不知所度遂挺身佩印從璋使走歸順璋陽泣而迎之奉之别館猛既入處左右無一田州人耳目塗塞而璋日詭猛曰天兵退矣又曰天兵聞君走交南不敢輒犯請事軍門矣猛聊喜慰而胡堯元等嫉希儀獨破隘攘功以萬人搗歸順璋先覺之遣人持百牛千醖迎軍三十里曰天兵逺勞謹饋犒飲每牛加牿繫之一㭿侑列十醖堯元等怪璋暇整而諸軍得犒喜遂屯不進璋復搆茅舍千間一夕而訖諸軍安之璋乃綸巾氅服雜佩上首揮麈尾逍遙詣諸將叩首曰死罪死罪昨猛敗將越歸順走交南璋邀擊之猛目集流矢南去不知所往急之恐糾逆虜反幸緩五日當搜致也堯元等許之璋還詭猛曰天兵已退非陳奏不白請君裁之猛曰固所願也安得屬草者璋曰易易耳令人為猛草奏促猛出印實封之璋既知猛印所在乃設酒賀猛鼓樂殷作酒中以錦衣二襲鴆飲一甌獻猛曰天兵索君甚急不能庇覆請自便無波及也猛大怒呼曰竟墮老姦矣遂仰鴆死斬其首并府印函之間道馳詣軍門度已到乃斬他囚首貫猛尸舁擲諸軍諸軍囂攘支解爭擊殺十餘人飇馳軍門則猛首已梟一日矣諸將大恚恨遂浸淫毁璋而布政使嚴紘等復害鏌隂壞其事倡言猛實不死死者道士錢一真也御史石金遂劾鏌落職而希儀等俱不論功璋大恨遜職於子瓛而黃冠學辟穀矣論曰岑猛之伏誅也岑璋掎之趙臣啓之沈希儀主之而功皆不録何以勸後來也兩廣威令寖不行於土官什九類此書生無逺略有司惜小費急則倉皇漫許已則避泥食言瑣瑣戚戚興讒參嫉靦負不顧彼其人寧惜軍國重輕哉趙楷李寰趙楷者廣西龍州土官族子也其先趙帖堅洪武初以萬戶府歸附改知州六傳而至趙源源妻岑氏田州知府岑鏞女也負其家勢專制部中源死無子而庶兄溥有二子長相次楷州人推相當立楷妬之謂岑氏曰主何不自為地相誠立則州非主有也何不購乳子而擁之以主家之靈誰敢異議者是主世世有龍州也岑深然之遂以媵僕韋隊之子璋詭云遺腹鞠之外家而岑之兄子猛方熾乃遣府目韋好以兵三千納璋龍州弗克楷遂奏言璋實源子當立為相所篡事下督府而楷璋通賂上下莫敢主相之故千金之子必重垣三家之市必復户不為病也乃我土官雜襲夷風脫略王法徵兵不待符檄之合慮囚不煩律例之讞盼睞則蔀屋生輝揮霍而壯士失色若此者何談卿相矧于富翁故不若為官也談曰不然主知其二不知其三主家簮纓而禪者九世矣保首領者幾人也向為農夫以沒齒安有殺戮之憂哉語曰厲憐王夫厲惡疾也而猶憐王者誠憫生而惕禍也楷知談劘切已也不懌而罷談亦逃去他日督府復以前令諭楷楷計寶弱易與且趙宗單寶死官必及已不如徼厚利而徐圖之兩得乃陽應曰願以官還寶也督府大喜令寶以五十金謝楷益以腴田三十一村楷既得田愈富厚招諸姦猾自翼復求韋璋之子應育之令往來寶所應美姿容自喜寶妻通焉動息必以告楷楷乃為應奏言應源孫也宗亂二世不得立事下督府都御史蔡經猶豫不敢決而寶日荒悍嘗宫姣男子王良以為閽者楷召良激之曰汝絶代人也畿甸之民忍殘其身以干進者欲藉勢官家徼富貴耳汝安所圖哉藏頭閨闥與獖豕無異曽不若騰馬纍牛之適也良曰恨不剔腎報之楷曰誠欲報耶吾為若主何如良曰幸甚楷乃糾州目鄧瑀李旭林盛等謀伐寶州人怨寶莫為言十六年九月楷遂以千人伐寶夜及寢門呼良曰至矣至矣良聞楷聲開門納楷執寶寢所斬之截枝拇及以寶妻去變聞會安南莫登庸篡主自立朝議征之登庸笑曰中國土官比比弒逆數十年無能正法者而獨慮及我何哉頃之憑祥叛酋李寰比周於楷都御史蔡經憂之屬副使翁萬達及汝成曰願二君戢定也萬達謂汝成曰此賊非計擒禍且不測時汝成鎮撫藤峽萬達獨行郡至南寧故沉滯不為理州人大譁萬達曰趙氏之族殫矣非楷莫立者顧負罪不丐我故遲之耳楷聞之頗慰萬達乃遣人謂楷曰楷誠以三十一村贖罪我當代之且以官畀楷益喜萬達愈厚與之時時稱楷智勇冠軍即南征可當一面楷遂統精兵千人詣萬達言事且以三十一村地圖來獻萬達留語旬日楷寖慰弛不為備部兵多以乏糧遣歸者萬達召楷及鄧瑀等入見伏壯士劫之曰汝輩滔天罪不得活命盡今日矣宜自為計楷死官必及汝子可為書諭汝黨勿亂也楷皇恐頓首曰門祚衰薄喪亂頻仍官府悉以罪楷何也楷誠死而官府食言官不及楷子奈何萬達曰食言者有如此日呼血而與之盟楷乃流涕頭搶地曰楷知罪矣為書諭其黨曰業已如此亂無益也可善撫我子以存趙氏萬達既得書即日杖楷等斃之以楷書諭其州人時楷子匡時生四年矣會汝成立之一州悉定乃以十三村還龍州十八村立縣治附太平府郭焉李寰者廣西憑祥州土官庶子也其先李升洪武十八年以憑祥洞歸附授巡檢永樂二年改縣治以升知縣事其後部落蕃衍當交址鎮南關為左江要害成化八年改州治以升孫廣寧知州事廣寧十子寰其季也廣寧死諸子爭立亂三四年竟以其孫珠嗣嘉靖十年死族弟珍珏爭立珍挈印奔况村况村土舍黃泰以其女黃孟妻之珏遂擅攝州事十四年州目李清李滿趙琪蘇寄枝等謀納珍説思明府土舍黃朝曰李珍仁信君子也失守宗祧越在草莽若以君之靈得復入奉蒸嘗願以全州服事備下屬也黃朝喜遂約黃泰以兵七百人納珍憑祥奪其印珏奔磬栁久之南海浪人歐紹賢周縉客憑祥説李珍曰州故省屬視思明伯仲也今屬思明則父子矣竊為公耻之珍遂悔約不屬思明蘇寄枝李滿爭之不得遂有隙而隂比黃朝朝有外婦子時芳長矣詭云廣寧孫也父璉爭立時避居思明生朝以千人納時芳憑祥弗克而李珍日荒淫無度醉即手創人州人患之寰謀廢立而珍妻黃孟亦以失寵孤憤寰通焉十七年三月寰謂歐紹賢周縉曰李珍不道賊虐部民吾欲修衆怨舉大事而難黃泰奈何紹賢等曰黃泰疑不助也試為主公緩頰探之往見黃泰曰南海之濱有不禮其妻而淫於他妻者其妻之父兄聞而弗怒也可謂仁恕大度人矣泰曰是惡足稱也不禮其女是不有其父也不禮其妹是不有其兄弟也若者忍之是不自有其先人也辱先之人謂之不孝是垢夫也而惡足稱也紹賢等歸謂寰曰主公無慮黃泰不助珍也寰遂約李滿蘇寄枝將為亂患趙琪掌外甲也以兵劫琪曰吾欲云云不從者族死琪不得已與之盟而隱之紹賢等曰未也舉大事而無內應譬之啓鑰無簧難以入矣寰曰善而李珍之妾菂玖者有淫行寰乃遣刺客趙應偽為珍謂菂玖曰主君聞子有私人遣我夜伺子菂玖皇恐曰奈何趙應曰不如亡也主君猜忌久矣不亡必死菂玖頓首曰幸公生之應許諾寰復遣人謂黃孟曰今夜十郎將即子排闥無驚黃孟許之以酒灌珍沉醉乙夜趙應竊菂玖穴垣亡頃之蘇寄枝偽驚呼曰閨竇何豁也黃孟驚起開門而寰等擁兵入執珍寢所斬之李清聞亂呼趙琪以外甲入救琪匿不至寰遂持黃孟並坐部兵發庫藏爭財亂擊殺者數十人明日寰置酒髙會召李清清不得已赴之臨觴竊嘆寰私於歐紹賢曰是夫腹誹者就座中擊殺之會安南逆臣莫登庸反因厚賂寰為嚮道曰急緩纎巨告我變聞都御史蔡經大駭屬副使翁萬達圖之萬達曰是未可以力取也此賊擁強兵當險隘外連反虜急之且為邊患不若因而用之相機以取也乃遣人諭寰曰天子將有事於南夷邊圉之臣有用命者尊官可立取也寰遂自薦曰願效力萬達益厚與之又遣人諭黃泰曰人言李珍之死倡亂者汝也獄必首汝泰大驚辨白萬逹曰無多言能擒李寰心事乃白耳泰謹諾八月遣指揮錢希賢徵兵泰所部勒若行邊者至憑祥襲之擒李寰李滿蘇寄枝等論死即日榜其黨曰罪止寰等數人雖父子不及也一州帖然已而李珏李時芳復爭立汝成以分守至左江會萬逹鞫之而時芳倚黃朝通賂上下皆云當立姦民農球等復控督府言時芳真李璉子廣寧孫也萬達汝成力判白之乃論時芳死黜珏而立李琪之子佛嗣珍論曰廣西古羈縻之域也明興諸酋納欵者因而與之俾掌其土疆索以藩父子繼兄弟及比封建之遺焉疏節闊目恢而不弛寓約束於假借洪武永樂皇稜大抗四隩既同時掣鯨鯢寡懲衆誡莫不重足疊迹以待徵令𢎞治已前恬熙世際詳內略外諸酋稍稍越法然繼及之典甲令具昭下乞上俞無怵異議正德中權姦橫訌太閽乘之紀綱瀾渙邊機幕議非賕不行開府監司因以為利啓土酋輕侮嘉靖以來察察汶汶罔上遂私墨者以章賂敗類賢者以避嫌徼名承勘展轉往往摘疵文致牽其前人以沮請寄淹嵗月諸酋多以白衣署職恩威並爽徵兵禦宄又以甘言誘之罷役論功靦然食約致彼􅔵望長傲誨侮此其魁尤逮乎逆節滋蔓僵尸喋血莫敢草剃徒以文移按驗叱吒相凌安可弭也龍憑之變皆以繼及未明嫡孽爭立姁噢不誅多歷年所揮霍塞隈貽屬國觀哂於鑠仁夫刳其兩雄市不徙隧笑言設伏剪削禍本賢於林會之師功深而不襮其所經略黽勉則豫與有聞焉嘗與仁夫極論弊源白之主者作舍道謀悅而不繹賢墨殊軌二者一居可勝嘆哉黃􅛵黃􅛵者思明府夷酋也上世皆土官弟􅒿以世嫡為思明府知府正統中􅛵以捍禦功授丘溫衛指揮纍遷廣西都指揮使守潯州者八年威振境內景泰二年八月􅒿之嫡子銶怨不得襲􅛵以計授之聚兵五千圍府執􅒿及兄鈞等弒之已而又圖奪嫡乃盡發銶罪使其子灝陽聞於官若欲為􅒿伸理者巡撫刑部侍郎李棠總兵都督僉事武毅亷鞠實之􅛵坐罪當死時純皇帝在東宫景皇帝有子曰見濟􅛵遣人入京先賂用事者乃具奏請立見濟為皇太子景皇帝大悅命禮部會廷臣議大學士陳循力主之將復疏署名吏部尚書王翺有難色循持筆作半跪強之翺不得已亦署名上如所請于是憲宗出就沂邸大臣皆進官行賞有差翺得賜元寶頓足扣案歎曰此朝廷何等大事乃出一蠻夷耶吾儕愧死矣􅛵遂蒙大赦原免復職賜誥命極其褒奬進都督充參將勢焰熏灼人多趨其門棠致仕未幾見濟薨諡懷愍太子英皇復辟憲宗復位東宫時􅛵已死命發棺鞭其尸論曰至今人言易儲事謂肅愍公卷舌而不諫殆有罪焉而其子孫作家狀亦云景皇帝大漸時肅愍草疏請復辟欲上而不果是殆為其祖父文過語正不當爾也肅愍豈其懵耶所見或有一道焉第陳循因夷酋之議而承以為功肅愍不為開陳大體何也其後鍾御史同章儀制綸廖少卿莊相繼請復儲被杖瀕死目之遺烈可勝誅哉炎徼紀聞卷一
